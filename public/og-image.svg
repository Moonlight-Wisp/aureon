<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0e13"/>
      <stop offset="1" stop-color="#161a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#3157f6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3157f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3157f6"/>
      <stop offset="1" stop-color="#121417"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand row -->
  <g transform="translate(100 92)">
    <rect width="72" height="72" rx="18" fill="url(#mark)"/>
    <g transform="rotate(24 36 36)">
      <rect x="21" y="30" width="8" height="24" rx="4" fill="#c6f35b"/>
      <rect x="32" y="16" width="8" height="38" rx="4" fill="#c6f35b"/>
      <rect x="43" y="24" width="8" height="30" rx="4" fill="#c6f35b"/>
    </g>
    <text x="92" y="50" font-family="Manrope, Arial, sans-serif" font-size="34" font-weight="800" fill="#eef0f4" letter-spacing="-1">Aureon</text>
  </g>

  <!-- headline -->
  <text x="100" y="330" font-family="Manrope, Arial, sans-serif" font-size="82" font-weight="800" fill="#ffffff" letter-spacing="-2">Votre entreprise.</text>
  <text x="100" y="428" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="82" font-weight="700" fill="#c6f35b" letter-spacing="-2">En mode avance rapide.</text>

  <!-- subline -->
  <text x="102" y="500" font-family="DM Sans, Arial, sans-serif" font-size="30" fill="#a7abb6">L'IA qui transforme vos opérations en systèmes intelligents.</text>
</svg>
